<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 90 32" width="90" height="32" role="img" aria-labelledby="title desc">
  <title id="title">Flowcus mark</title>
  <desc id="desc">Three damping wave peaks resolving into a short straight line that ends in a coral focal point. The progression from large oscillation to calm steadiness represents scattered attention settling into focus.</desc>
