    <path d="M 2 16
             C 4.5 16 4.5 4 7 4
             C 10.5 4 10.5 25 14 25
             C 17.5 25 17.5 9 21 9
             C 24.5 9 24.5 20 28 20
             C 31.5 20 31.5 14 35 14
             C 37.5 14 37.5 16 40 16
             L 72 16"/>
  </g>
  <circle cx="78" cy="16" r="2.5" fill="#1F1F1F"/>
</svg>
